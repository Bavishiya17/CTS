<!DOCTYPE html>
<html>
<head>
    <title>Box Model Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Community Events</h1>

<div class="eventCard">
    <h2>Music Festival</h2>
    <p>Enjoy live performances and entertainment.</p>
</div>

</form>

</div>

    Hidden Using Display
</div>

</body>
</html>
