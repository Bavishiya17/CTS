<!DOCTYPE html>
<html>
<head>
  <title>Submit Registration</title>
  <style>
    body { font-family: Arial; text-align: center; background: #eef2f3; }
    .box {
      width: 300px;
      margin: 60px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    button {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }
    #status { margin-top: 10px; }
  </style>
</head>
<body>

<div class="box">
  <h2>Send Data</h2>
  <button onclick="sendData()">Submit</button>
  <p id="status"></p>
</div>

<script src="main.js"></script>
</body>
</html>
