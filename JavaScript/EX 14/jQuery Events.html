<!DOCTYPE html>
<html>
<head>
  <title>jQuery Events</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }

    .card {
      display: none;
      width: 250px;
      margin: 30px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    button {
      padding: 10px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<h2>Community Event</h2>

<button id="registerBtn">Show Event</button>

<div class="card" id="card">
  <h3>Music Night 🎵</h3>
  <p>Join us for fun and music!</p>
</div>

<script src="main.js"></script>
</body>
</html>
