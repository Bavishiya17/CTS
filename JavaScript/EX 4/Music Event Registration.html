<!DOCTYPE html>
<html>
<head>
  <title>Event Counter</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f4f6f9; }
    .box { margin-top: 50px; padding: 20px; background: white; width: 300px; margin-left: auto; margin-right: auto; border-radius: 10px; box-shadow: 0 0 10px gray; }
    button { padding: 10px; background: blue; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>

<div class="box">
  <h2>Music Event Registration</h2>
  <button onclick="register()">Register</button>
  <h3 id="count">Total: 0</h3>
</div>

<script src="main.js"></script>
</body>
</html>
