<!DOCTYPE html>
<html>
<head>
  <title>Event Registration</title>
  <style>
    body { font-family: Arial; background: #f2f6ff; text-align: center; }
    .box {
      width: 320px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    input, select {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
    }
    button {
      background: blue;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #msg { margin-top: 10px; }
  </style>
</head>
<body>

<div class="box">
  <h2>Register Event</h2>

  <form onsubmit="submitForm(event)">
    <input name="name" placeholder="Name">
    <input name="email" placeholder="Email">
    <select name="event">
      <option>Music</option>
      <option>Dance</option>
      <option>Tech</option>
    </select>

    <button>Submit</button>
  </form>

  <p id="msg"></p>
</div>

<script src="main.js"></script>
</body>
</html>
